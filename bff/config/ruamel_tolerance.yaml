# ruamel.yaml round-trip tolerance whitelist
# Generated by SPIKE-02 on 2026-04-20
# Tested against: tests/fixtures/{alpin,dostoneu}/**/*.yaml
#
# HOW TO READ THIS FILE
# ----------------------
# Each entry in benign_patterns describes a class of diff that ruamel.yaml
# may introduce during a load→dump round-trip that does NOT constitute
# structural drift.  The D14 byte_diff_drift gate must accept these patterns
# rather than blocking a write.
#
# unexpected_diffs must remain empty for the verdict to be PASS.
# If unexpected_diffs is non-empty, escalate to the architect before
# implementing D5 (ruamel write path) or D14 (byte_diff_drift gate).

benign_patterns:

  - pattern: "trailing_newline_added"
    description: >
      ruamel.yaml appends a single trailing newline when the original file
      lacks one.  This is cosmetically harmless and does not change any YAML
      value.  The byte_diff_drift gate must allow a one-byte '\n' append at
      EOF.
    safe: true
    example_diff: |
      --- original
      +++ roundtripped
      @@ -N +N @@
      +

  - pattern: "comment_spacing_normalised"
    description: >
      ruamel.yaml may adjust the number of spaces between a value and an
      inline comment so that it aligns with the key's indentation depth.
      Specifically, it normalises to two spaces before a '#' on the same
      line.  Comment text is preserved verbatim; only leading whitespace
      before '#' changes.
    safe: true
    example_diff: |
      --- original
      +++ roundtripped
      @@ -N +N @@
      -monitoring::interval: 300 # seconds
      +monitoring::interval: 300  # seconds

  - pattern: "document_start_marker_added"
    description: >
      If the original file begins with '---' (explicit document start marker)
      ruamel preserves it.  If the file lacks '---', ruamel does NOT add one
      in round-trip mode — this pattern is noted here for completeness because
      it is a common misconception.  No drift expected on this axis.
    safe: true

  - pattern: "anchor_alias_preserved"
    description: >
      ruamel.yaml preserves YAML anchors (&name) and aliases (*name) exactly
      as-is in round-trip mode.  No anchor mangling is expected.  If an anchor
      is lost (alias expanded inline), that is a structural diff — see
      unexpected_diffs.
    safe: true

  - pattern: "block_scalar_style_preserved"
    description: >
      Literal block scalars (|) and folded scalars (>) are preserved in their
      original style.  ruamel does not coerce block scalars to flow scalars or
      vice versa in round-trip mode.
    safe: true

  - pattern: "quoted_string_style_preserved"
    description: >
      With preserve_quotes=True (set in the spike script), ruamel preserves
      single-quoted and double-quoted strings exactly.  Without
      preserve_quotes, ruamel may strip unnecessary quotes — which is benign
      for value semantics but changes bytes.  The production write helper
      MUST set preserve_quotes=True to avoid triggering the byte_diff_drift
      gate on initially-quoted strings.
    safe: true
    action_required: >
      Set yaml.preserve_quotes = True in every ruamel YAML() instance used
      for hieradata writes (already done in the spike script; must be carried
      forward to bff/clients/gitlab_client.py write path).

# --------------------------------------------------------------------------
# UNEXPECTED / STRUCTURAL DIFFS
# If this list is non-empty the verdict is FAIL and the architect must be
# notified before any D5 or D14 story is implemented.
# --------------------------------------------------------------------------
unexpected_diffs: []

# --------------------------------------------------------------------------
# VERDICT
# --------------------------------------------------------------------------
verdict: "PASS"

# --------------------------------------------------------------------------
# NOTES
# --------------------------------------------------------------------------
