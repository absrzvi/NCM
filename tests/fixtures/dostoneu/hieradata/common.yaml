fallback_dns::local_domains:
  - nomad-demo.com

#Fis TrainId due to split into multiple project_ids and fis ip needs to be calculated with train id
#magic /16 subnet which only goes up to 127
fis_id: 0

gpsd_ws::rtl_enabled: false
gpsd_ws::reflector_enable: true
# yamllint disable-line rule:line-length
gpsd_ws::reflector_listen_ip: "%{networking.interfaces.vlan32.ip}"

mar3_base::use_sharedlink: true
mar3_base::unmanaged_devices:
  - lo

# yamllint disable-line rule:line-length
mar3_captiveportal_api::use_leases_for_connected_devices: false
mar3_captiveportal_api::client_vlan: "vlan10,vlan20"
mar3_captiveportal_api::media_api_url: "https://railnet.oebb.at/api/orf/livetv/status"
mar3_captiveportal_api::rtl_enabled: false
mar3_captiveportal_api::remote_logging_hash_mac: true
mar3_captiveportal_api::salt_hash: true
mar3_captiveportal_api::service_classes:
  - id: 1
    name: "standard"
    reset_interval: 0
    initial_prio_class: 1
    initial_bw_down: 1000000
    initial_bw_up: 1000000
    limits:
      - fair_use: 104857600
        when_reached_bw_down: 1000000
        when_reached_bw_up: 1000000
        when_reached_prio_class: 1

mar3_frontend::rtl_enabled: false
mar3_frontend::tunnel_remote_host: "213.208.157.79"
mar3_frontend::wan_links:
  # startup cmd - switch to X => GPS FALLBACK
  - id: 1
    name: ce0p0
    type: wwan
    slot: 1
    startup_commands:
      - use bands all
      - switch to 1
  - id: 2
    name: ce1p0
    type: wwan
    slot: 4
    startup_commands:
      - use bands all
      - switch to 4
  - id: 3
    name: ce2p0
    type: wwan
    slot: 1
    startup_commands:
      - use bands all
      - switch to 1
  - id: 4
    name: ce3p0
    type: wwan
    slot: 4
    startup_commands:
      - use bands all
      - switch to 4
  - id: 5
    name: wlan0
    type: ethernet
  - id: 6
    name: lan2
    type: ethernet
mar3_frontend::vlan_links:
  - id: 32
    type: cascading
    config:
      latency_threshold: 100
      # A1              23201
      # Drei            23205, 23210
      # Telekom DE      26201, 26206, 26278
      # Vodafone DE     26202, 26204, 26209
      # Sunrise CH      22802, 22812, 22860
      # Vodafone NL     20404
      # KPN             20408, 20410
      # O2 BE "Epsilon" 20610
      groups: |-
        [
          {
            "name": "priority1",
            "codes": [
              23201,
              23205, 23210,
              26201, 26206, 26278,
              26202, 26204, 26209,
              22802, 22812, 22860,
              20404,
              20408, 20410
            ]
          }, {
            "name": "priority2",
            "codes": [
              20610
            ]
          }
        ]

