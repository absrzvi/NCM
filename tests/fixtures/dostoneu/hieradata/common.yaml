  [
    "bash-completion",
    "devops-test-tools",
    "bmon",
    "mtr",
    "conntrack",
    "dnsutils",
    "net-tools",
    "htop",
    "iperf",
    "iperf3",
    "iotop",
    "lldpd",
    "nmap",
    "rsync",
    "snmp",
    "stress",
    "sysstat",
    "tmux",
    "tree",
    "nd-mibs",
    "bridge-utils",
    "firmware-atheros",
    "sshpass",
  ]

caching_dns::forwarders:
  - 172.16.195.77
caching_dns::acls:
  management:
    - "10.<%= $facts['projectid_21net']+128 %>.<%= $facts['trainid_21net'] %>.0/24"
    - localhost
  passenger1:
    - "192.168.208.0/22"
  passenger2:
    - "192.168.224.0/22"
  staff:
    - "10.205.%{::trainid_21net}.0/24"
caching_dns::management_domains:
  - name: "nomadrail.com"
    network_entries:
      - name: "engineering"
        full_ip: "%{networking.interfaces.bond0.ip}"
caching_dns::domains:
  wifi.test:
    name: wifi.test
    network_entries:
      ns01:
        ip: "10.<%= $facts['trainid_21net'] %>.0.<%= $facts['unitid_21net']%>"
      "@":
        ip: "10.<%= $facts['trainid_21net'] %>.0.<%= $facts['unitid_21net']%>"
  railnet.oebb.at:
    name: oebb.passengerwifi.com
    network_entries:
      ns01:
        ip: "192.168.208.1"
      "@":
        ip: "192.168.208.1"
  railnetregio.oebb.at:
    name: railnetregio.oebb.at
    network_entries:
      ns01:
        ip: "192.168.208.1"
      "@":
        ip: "192.168.208.1"
  engineering.nomadrail.com:
    name: engineering.nomadrail.com
    network_entries:
      ns01:
        ip: "10.205.%{::trainid_21net}.1"
      "@":
        ip: "10.205.%{::trainid_21net}.1"
  mgmt_engineering.nomadrail.com:
    name: engineering.nomadrail.com
    network_entries:
      ns01:
        ip: "10.<%= $facts['projectid_21net'] + 128 %>.<%= $facts['trainid_21net']%>.<%= $facts['unitid_21net']%>"
      "@":
        ip: "10.<%= $facts['projectid_21net'] + 128 %>.<%= $facts['trainid_21net']%>.<%= $facts['unitid_21net']%>"
  onboard:
    name: onboard
    network_entries:
      ns01:
        ip: "10.<%= $facts['projectid_21net'] + 128 %>.<%= $facts['trainid_21net']%>.<%= $facts['unitid_21net']%>"
      "@":
        ip: "10.<%= $facts['projectid_21net'] + 128 %>.<%= $facts['trainid_21net']%>.<%= $facts['unitid_21net']%>"
        aliases:
          - mqtt
          - ntp
          - engineering.nomadrail.com
caching_dns::overrides:
  client-overrides:
    oebb.passengerwifi.com:
      ip: "192.168.208.1"
      aliases:
        - railnet.oebb.at
  staff-overrides:
    railnet.oebb.at:
      ip: "10.205.%{::trainid_21net}.1"
      aliases:
        - railnet.oebb.at
    engineering.nomadrail.com:
      ip: "10.205.%{::trainid_21net}.1"
caching_dns::views:
  passenger1:
    acls:
      - passenger1
    domains:
      - railnet.oebb.at
      - railnetregio.oebb.at
    overrides:
      - client-overrides
  management:
    acls:
      - management
    domains:
      - onboard
      - mgmt_engineering.nomadrail.com
  staff:
    acls:
      - staff
    domains:
      - railnet.oebb.at
      - railnetregio.oebb.at
      - engineering.nomadrail.com
    overrides:
      - staff-overrides

classes:
  - "::train_role::ccu"

cron::default_cron_timezone: "CEST"
cron::jobs:
  - name: "Scheduled CCU Reboot"
    user: root
    hour: "3"
    minute: "0"
    command: "/usr/sbin/reboot"

cron:
  name: "System update and Reboot"
  user: root
  hour: "4"
  minute: "0"
  command: "/usr/local/sbin/system_update_cron"

